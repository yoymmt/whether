<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現在時刻と天気予報</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin-top: 50px;
            background-color: #cdc797;
            color: #333;
        }

        h1 {
            font-size: 2.0em;
            text-align: center;
            margin-bottom: 20px;
        }

        #time, #weather {
            font-size: 1.5em;
            text-align: left;
            margin: 10px 20px;
        }
    </style>
</head>
<body>
    <h1>現在時刻と天気予報</h1>
    <div id="time"></div>
    <div id="weather"></div>

<script>
    function updateTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const timeString = `${hours}:${minutes}`;
        document.getElementById('time').textContent = `現在時刻: ${timeString}`;
    }

    async function updateWeather() {
        try {
            const response = await fetch('/weather');

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();

            const weatherString =
                `${data.city}の天気: ${data.description}, 気温: ${data.temp}°C`;

            document.getElementById('weather').textContent = weatherString;

        } catch (error) {
            console.error('天気取得エラー:', error);
            document.getElementById('weather').textContent =
                '天気情報を取得できませんでした。';
        }
    }

    window.onload = function () {
        updateTime();
        updateWeather();

        setInterval(updateTime, 60000);
        setInterval(updateWeather, 600000); // 天気は10分ごとで十分
    };
</script>
</body>
</html>
